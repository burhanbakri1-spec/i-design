<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scroll Shrink Effect</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      padding: 40px 24px;
    }
    h1 {
      text-align: center;
      font-weight: 300;
      font-size: 28px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #222;
      margin-bottom: 48px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 32px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .card {
      background: #fff;
      border-radius: 0;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      transition: transform 2s cubic-bezier(0.25, 0.1, 0.25, 1);
      will-change: transform;
    }
    .card.scrolling {
      transform: scale(0.9);
    }
    .card-image {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
    }
    .card-body {
      padding: 20px 18px 24px;
    }
    .card-body h2 {
      font-weight: 400;
      font-size: 16px;
      color: #111;
      margin-bottom: 4px;
    }
    .card-body .meta {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .card-body .desc {
      font-size: 13px;
      color: #555;
      margin-top: 10px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>Projects</h1>
  <div class="grid" id="grid"></div>

  <script>
    const projects = [
      { title: 'The Plus', loc: 'Magnor, Norway', desc: 'A striking sculptural form emerging from the landscape.', img: 'https://images.unsplash.com/photo-1487958449943-2429e8be8625?w=600&q=70' },
      { title: 'Copenhill', loc: 'Copenhagen, Denmark', desc: 'An innovative waste-to-energy plant with a ski slope.', img: 'https://images.unsplash.com/photo-1511818966892-d7d671e672a2?w=600&q=70' },
      { title: '8 House', loc: 'Copenhagen, Denmark', desc: 'A figure-eight shaped mixed-use complex.', img: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600&q=70' },
      { title: 'The Shed', loc: 'New York, USA', desc: 'A kinetic cultural venue with a movable shell.', img: 'https://images.unsplash.com/photo-1486325212027-8081e485255e?w=600&q=70' },
      { title: 'Superkilen', loc: 'Copenhagen, Denmark', desc: 'A vibrant urban park celebrating cultural diversity.', img: 'https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=600&q=70' },
      { title: 'Mountain Dwellings', loc: 'Copenhagen, Denmark', desc: 'Terraced housing built over a parking garage.', img: 'https://images.unsplash.com/photo-1473163928189-364b2c4e1135?w=600&q=70' },
      { title: 'Le Goéland', loc: 'Saint-Malo, France', desc: 'A seaside pavilion inspired by the shape of a seagull.', img: 'https://images.unsplash.com/photo-1518005020951-eccb494ad742?w=600&q=70' },
      { title: 'Vessel', loc: 'New York, USA', desc: 'A honeycomb-like structure at Hudson Yards.', img: 'https://images.unsplash.com/photo-1448630360428-65456685c9ce?w=600&q=70' },
    ];

    const grid = document.getElementById('grid');
    for (const p of projects) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img class="card-image" src="${p.img}" alt="${p.title}" loading="lazy" />
        <div class="card-body">
          <h2>${p.title}</h2>
          <div class="meta">${p.loc}</div>
          <div class="desc">${p.desc}</div>
        </div>
      `;
      grid.appendChild(card);
    }

    const cards = document.querySelectorAll('.card');
    let scrollTimer = null;

    // IntersectionObserver: mark visible cards
    const observer = new IntersectionObserver((entries) => {
      for (const entry of entries) {
        entry.target.dataset.visible = entry.isIntersecting ? '1' : '0';
        // If card is not visible, ensure it's not shrunk
        if (!entry.isIntersecting) {
          entry.target.classList.remove('scrolling');
        }
      }
    }, { threshold: 0 });

    for (const card of cards) {
      observer.observe(card);
    }

    window.addEventListener('scroll', () => {
      // Clear previous timeout
      if (scrollTimer) clearTimeout(scrollTimer);

      // Apply shrink to all visible cards
      for (const card of cards) {
        if (card.dataset.visible === '1') {
          card.classList.add('scrolling');
        }
      }

      // Set timeout to remove shrink when scrolling stops
      scrollTimer = setTimeout(() => {
        for (const card of cards) {
          card.classList.remove('scrolling');
        }
      }, 100);
    }, { passive: true });
  </script>
</body>
</html>
