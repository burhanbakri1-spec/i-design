<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Musée Atelier — Layout</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 3rem;
      max-width: 1000px;
      width: 100%;
    }

    .text-block {
      flex-shrink: 0;
      text-align: left;
    }

    .text-block .line1 {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #111;
      line-height: 1.1;
    }

    .text-block .line2 {
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: -0.01em;
      color: #555;
      margin-top: 0.15rem;
    }

    .text-block .line3 {
      font-size: 0.95rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: #999;
      margin-top: 0.5rem;
      text-transform: uppercase;
    }

    .image-block {
      flex: 1;
      min-width: 0;
    }

    .image-block img {
      display: block;
      width: 100%;
      border-radius: 6px;
    }

    @media (max-width: 768px) {
      .card {
        flex-direction: column-reverse;
        gap: 1.5rem;
      }

      .text-block {
        width: 100%;
      }

      .text-block .line1 {
        font-size: 2rem;
      }

      .text-block .line2 {
        font-size: 1.4rem;
      }

      .text-block .line3 {
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="text-block">
      <div class="line1">Musée Atelier</div>
      <div class="line2">Audemars Piguet</div>
      <div class="line3">LE BRASSUS, SWITZERLAND</div>
    </div>
    <div class="image-block">
      <img src="https://picsum.photos/id/20/800/500" alt="Musée Atelier">
    </div>
  </div>
</body>
</html>
