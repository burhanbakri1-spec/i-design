<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Left Title</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', Arial, sans-serif;
      background: #fff;
      color: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
    }

    .page {
      display: flex;
      align-items: center;
      width: 100%;
      padding-left: 60px;
    }

    .title-block {
      flex-shrink: 0;
    }

    .title-block h1 {
      font-size: 42px;
      font-weight: 600;
      letter-spacing: -0.5px;
      line-height: 1.2;
      color: #111;
    }

    .title-block .location {
      font-size: 20px;
      font-weight: 200;
      color: #888;
      letter-spacing: 0.3px;
      margin-top: 4px;
    }

    .content {
      flex: 1;
      padding: 0 60px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="title-block">
      <h1>The Plus</h1>
      <div class="location">Magnor, Norway</div>
    </div>
    <div class="content"><!-- محتوى إضافي هنا --></div>
  </div>
</body>
</html>
