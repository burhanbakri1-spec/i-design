<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>The Plus - الصفحة الرئيسة</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    .project {
      display: flex; /* تقسيم إلى نص + صورة */
      align-items: center;
      margin-bottom: 40px;
    }

    .project-text {
      flex: 1; /* النص يأخذ مساحة */
      text-align: left;
      padding: 20px;
    }

    .project-text h2 {
      margin: 0;
      font-size: 28px;
    }

    .project-text p {
      margin: 5px 0;
      font-size: 20px;
      color: #555;
    }

    .project-image {
      flex: 2; /* الصورة أكبر */
      text-align: center;
    }

    .project-image img {
      max-width: 100%;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <div class="project">
    <!-- النص في الجانب الأيسر -->
    <div class="project-text">
      <h2>The Plus</h2>
      <p>Magnor, Norway</p>
    </div>

    <!-- الصورة في الجانب الأيمن -->
    <div class="project-image">
      <img src="image1.png" alt="The Plus">
    </div>
  </div>

</body>
</html>
